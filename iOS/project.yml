name: Cramline
options:
  bundleIdPrefix: com.shimondeitel.cramline
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Cramline:
    type: application
    platform: iOS
    sources:
      - path: Cramline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.cramline
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Cramline/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  CramlineTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CramlineTests
      - path: Cramline.storekit
    dependencies:
      - target: Cramline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.cramline.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  CramlineUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CramlineUITests
    dependencies:
      - target: Cramline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.cramline.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Cramline:
    build:
      targets:
        Cramline: all
        CramlineTests: [test]
        CramlineUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Cramline.storekit
    test:
      config: Debug
      storeKitConfiguration: Cramline.storekit
      targets:
        - CramlineTests
        - CramlineUITests
    archive:
      config: Release
